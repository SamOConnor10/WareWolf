{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}WareWolf{% endblock %}</title>
  {% block extra_head %}{% endblock %}

  <!-- Bootstrap + Icons (use whatever you already use in base.html) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="{% static 'inventory/images/warewolf-favicon.png' %}">

  <style>
    body.auth-body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.22) 0, transparent 45%),
        radial-gradient(circle at bottom, rgba(37,99,235,0.10) 0, transparent 55%),
        #f5f7fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .auth-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 10px;
    }

    .auth-card {
      border-radius: 18px;
      box-shadow:
        0 24px 60px rgba(15, 23, 42, 0.18),
        0 0 0 1px rgba(148, 163, 184, 0.16);
      border: none;
      backdrop-filter: blur(6px);
      background: rgba(255,255,255,0.96);
    }

    .auth-card .card-body {
      padding: 20px 20px;
    }

    @media (min-width: 768px) {
      .auth-card .card-body {
        padding: 24px 26px;
      }
    }

    .auth-heading {
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .auth-subtitle {
      color: #6b7280;
      font-size: 0.95rem;
    }

    .auth-logo {
      height: 340px;
      width: auto;
    }

    .auth-logo-wrapper {
      margin-bottom: 0.25rem;
    }

    .auth-footer {
      font-size: 0.85rem;
      color: #9ca3af;
      margin-top: 1.5rem;
    }
  </style>
</head>

<body class="auth-body">
  <div class="auth-shell">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">

          <div class="text-center auth-logo-wrapper">
            <img src="{% static 'inventory/images/warewolf-auth-logo.png' %}" alt="WareWolf logo" class="auth-logo">
          </div>

          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}

          <div class="card auth-card">
            <div class="card-body">
              {% block content %}{% endblock %}
            </div>
          </div>

          <div class="text-center auth-footer">
            WareWolf · Intelligent Warehouse and Inventory Management
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  (function () {
    var bar = document.getElementById("ww-nav-progress");
    if (!bar) return;
    var t = null;
    function start() {
      bar.classList.add("ww-nav-progress--on");
      bar.style.width = "0%";
      requestAnimationFrame(function () { bar.style.width = "38%"; });
      clearTimeout(t);
      t = setTimeout(function () { bar.style.width = "88%"; }, 420);
    }
    function done() {
      clearTimeout(t);
      bar.style.width = "100%";
      setTimeout(function () {
        bar.classList.remove("ww-nav-progress--on");
        bar.style.width = "0%";
      }, 160);
    }
    window.addEventListener("load", done);
    window.addEventListener("pageshow", function (e) { if (e.persisted) done(); });
    document.addEventListener("click", function (e) {
      var a = e.target.closest("a[href]");
      if (!a || a.target === "_blank" || a.hasAttribute("download")) return;
      if (a.getAttribute("data-ww-no-nav-progress") === "1") return;
      var href = a.getAttribute("href");
      if (!href || href.charAt(0) === "#" || href.indexOf("javascript:") === 0) return;
      try {
        var u = new URL(a.href, window.location.href);
        if (u.origin !== window.location.origin) return;
      } catch (err) { return; }
      if (e.metaKey || e.ctrlKey || e.shiftKey) return;
      start();
    }, true);
    document.addEventListener("submit", function (e) {
      var f = e.target;
      if (!f || f.tagName !== "FORM") return;
      if ((f.method || "").toLowerCase() !== "post") return;
      if (f.getAttribute("data-ww-no-nav-progress") === "1") return;
      start();
    }, true);
  })();
  </script>
</body>
</html>
