{% extends "inventory/base.html" %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
  <div>
    <h1 class="fw-bold mb-1 d-flex align-items-center gap-2">
      <span class="badge bg-success-subtle text-success border border-success-subtle rounded-3 p-2"><i class="bi bi-check-lg fs-5"></i></span>
      Password updated
    </h1>
    <p class="text-muted mb-0">Your password was changed successfully.</p>
  </div>
</div>

<div class="card shadow-sm border-0">
  <div class="card-body p-4 p-lg-5">
    <p class="mb-4">You can continue using WareWolf with your new password.</p>
    <div class="d-flex flex-wrap gap-2">
      <a href="{% url 'dashboard' %}" class="btn btn-primary">Go to Dashboard</a>
      <a href="{% url 'profile' %}?tab=security" class="btn btn-outline-secondary">Back to Security</a>
    </div>
  </div>
</div>
{% endblock %}
