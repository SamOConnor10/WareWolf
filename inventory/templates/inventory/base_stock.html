{% extends "inventory/base.html" %}

{% block content %}

<div class="d-flex mt-4">
    {% if not hide_stock_sidebar %}
    <!-- ========================= -->
    <!-- SIDEBAR                   -->
    <!-- ========================= -->
    <div id="sidebar" class="sidebar expanded shadow-sm">

        <!-- Header with toggle -->
        <div class="sidebar-header">
            <span class="sidebar-title">Stock</span>
            <button id="sidebarToggle" class="toggle-btn" type="button" title="Collapse sidebar" aria-label="Toggle sidebar">
                <i class="bi bi-chevron-left" id="sidebarArrow"></i>
            </button>
        </div>

        <!-- NAV LINKS -->
        <nav class="sidebar-nav">
            <a href="{% url 'item_list' %}" class="sidebar-link {% if view == 'items' %}active{% endif %}">
                <i class="bi bi-box-seam"></i>
                <span class="label">Stock Items</span>
            </a>
            <a href="{% url 'category_list' %}" class="sidebar-link {% if view == 'categories' %}active{% endif %}">
                <i class="bi bi-folder2"></i>
                <span class="label">Categories</span>
            </a>
        </nav>

    </div>
    <script>(function(){var s=document.getElementById("sidebar");if(s){try{if(localStorage.getItem("warewolf_sidebar_collapsed")==="true")s.classList.add("collapsed");}catch(e){}}})();</script>
    {% endif %}

    <!-- ========================= -->
    <!-- MAIN CONTENT AREA         -->
    <!-- ========================= -->
    <div id="mainContent" class="flex-grow-1 {% if hide_stock_sidebar %}ms-0{% else %}ms-3{% endif %}">
        {% block stock_content %}{% endblock %}
    </div>

</div>

<style>
/* ============================= */
/* SIDEBAR BASE                  */
/* ============================= */
#sidebar {
    width: 220px;
    min-width: 220px;
    transition: width 0.25s ease, min-width 0.25s ease;
    background: linear-gradient(180deg, #fafbfc 0%, #f5f6f8 100%);
    border-right: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 16px 0;
    height: fit-content;
    min-height: 200px;
    position: sticky;
    top: 24px;
}

/* Collapsed */
#sidebar.collapsed {
    width: 56px !important;
    min-width: 56px !important;
}

#sidebar.collapsed .label,
#sidebar.collapsed .sidebar-title {
    display: none !important;
}

#sidebar.collapsed #sidebarArrow {
    transform: rotate(180deg);
}

/* Header */
.sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px 12px;
    margin-bottom: 8px;
    border-bottom: 1px solid #e5e7eb;
}

.sidebar-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b7280;
}

.toggle-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    color: #6b7280;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
}

.toggle-btn:hover {
    background: #f3f4f6;
    color: #111827;
}

/* Nav */
.sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
}

#sidebar .sidebar-link {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    margin: 0 8px;
    text-decoration: none;
    color: #374151 !important;
    font-size: 0.9375rem;
    transition: background 0.2s ease, color 0.2s ease;
    border-radius: 8px;
    font-weight: 500;
}

#sidebar .sidebar-link i {
    font-size: 1.125rem;
    margin-right: 12px;
    flex-shrink: 0;
    opacity: 0.9;
}

#sidebar .sidebar-link:hover {
    background: var(--bs-primary-bg-subtle);
    color: var(--bs-primary) !important;
}

#sidebar .sidebar-link:hover i {
    opacity: 1;
}

#sidebar .sidebar-link.active {
    background: var(--bs-primary);
    color: #ffffff !important;
}

#sidebar .sidebar-link.active i {
    opacity: 1;
}

#sidebar.collapsed .sidebar-link {
    justify-content: center;
    padding: 10px;
}

#sidebar.collapsed .sidebar-link i {
    margin-right: 0;
}

/* Main content */
#mainContent {
    padding-top: 15px;
}

/* Dark mode support */
body.dark-mode #sidebar {
    background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
    border-color: #374151;
}

body.dark-mode .sidebar-header {
    border-color: #374151;
}

body.dark-mode .sidebar-title {
    color: #9ca3af;
}

body.dark-mode .toggle-btn {
    background: #374151;
    border-color: #4b5563;
    color: #9ca3af;
}

body.dark-mode .toggle-btn:hover {
    background: #4b5563;
    color: #e5e7eb;
}

body.dark-mode #sidebar .sidebar-link {
    color: #e5e7eb !important;
}

body.dark-mode #sidebar .sidebar-link:hover {
    background: #374151;
    color: color-mix(in srgb, var(--bs-primary) 72%, white) !important;
}

body.dark-mode #sidebar .sidebar-link.active {
    background: var(--bs-primary);
    color: #ffffff !important;
}
</style>


<script>
(function() {
    var sidebar = document.getElementById("sidebar");
    var sidebarToggle = document.getElementById("sidebarToggle");
    if (sidebarToggle && sidebar) {
        sidebarToggle.onclick = function () {
            sidebar.classList.toggle("collapsed");
            try { localStorage.setItem("warewolf_sidebar_collapsed", sidebar.classList.contains("collapsed")); } catch (e) {}
        };
    }
})();
</script>

{% endblock %}
