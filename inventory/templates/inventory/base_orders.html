{% extends "inventory/base.html" %}

{% block content %}

<div class="d-flex mt-4">
    <!-- ========================= -->
    <!-- ORDERS SIDEBAR            -->
    <!-- ========================= -->
    <div id="ordersSidebar" class="sidebar orders-sidebar expanded shadow-sm">
        <div class="sidebar-header">
            <span class="sidebar-title">Orders</span>
            <button id="ordersSidebarToggle" class="toggle-btn" type="button" title="Collapse sidebar" aria-label="Toggle sidebar">
                <i class="bi bi-chevron-left" id="ordersSidebarArrow"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'order_list' %}?type=purchase" class="sidebar-link {% if type_filter == 'purchase' %}active{% endif %}">
                <i class="bi bi-box-arrow-in-down"></i>
                <span class="label">Purchase Orders</span>
            </a>
            <a href="{% url 'order_list' %}?type=sale" class="sidebar-link {% if type_filter == 'sale' %}active{% endif %}">
                <i class="bi bi-box-arrow-up"></i>
                <span class="label">Sale Orders</span>
            </a>
        </nav>
    </div>
    <script>(function(){var s=document.getElementById("ordersSidebar");if(s){try{if(localStorage.getItem("warewolf_orders_sidebar_collapsed")==="true")s.classList.add("collapsed");}catch(e){}}})();</script>

    <!-- ========================= -->
    <!-- MAIN CONTENT              -->
    <!-- ========================= -->
    <div id="ordersMainContent" class="flex-grow-1 ms-3">
        {% block orders_content %}{% endblock %}
    </div>
</div>

<style>
.orders-sidebar {
    width: 220px;
    min-width: 220px;
    transition: width 0.25s ease, min-width 0.25s ease;
    background: linear-gradient(180deg, #fafbfc 0%, #f5f6f8 100%);
    border-right: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 16px 0;
    height: fit-content;
    min-height: 200px;
    position: sticky;
    top: 24px;
}
.orders-sidebar.collapsed {
    width: 56px !important;
    min-width: 56px !important;
}
.orders-sidebar.collapsed .label,
.orders-sidebar.collapsed .sidebar-title { display: none !important; }
.orders-sidebar.collapsed #ordersSidebarArrow { transform: rotate(180deg); }
.orders-sidebar .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px 12px;
    margin-bottom: 8px;
    border-bottom: 1px solid #e5e7eb;
}
.orders-sidebar .sidebar-title {
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b7280;
}
.orders-sidebar .toggle-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    color: #6b7280;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
}
.orders-sidebar .toggle-btn:hover {
    background: #f3f4f6;
    color: #111827;
}
.orders-sidebar .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 2px;
}
.orders-sidebar .sidebar-link {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    margin: 0 8px;
    text-decoration: none;
    color: #374151 !important;
    font-size: 0.9375rem;
    transition: background 0.2s ease, color 0.2s ease;
    border-radius: 8px;
    font-weight: 500;
}
.orders-sidebar .sidebar-link i {
    font-size: 1.125rem;
    margin-right: 12px;
    flex-shrink: 0;
    opacity: 0.9;
}
.orders-sidebar .sidebar-link:hover {
    background: #eff6ff;
    color: #1d4ed8 !important;
}
.orders-sidebar .sidebar-link.active {
    background: #1d4ed8;
    color: #ffffff !important;
}
.orders-sidebar.collapsed .sidebar-link {
    justify-content: center;
    padding: 10px;
}
.orders-sidebar.collapsed .sidebar-link i { margin-right: 0; }
#ordersMainContent { padding-top: 15px; }

body.dark-mode .orders-sidebar {
    background: linear-gradient(180deg, #1f2937 0%, #111827 100%);
    border-color: #374151;
}
body.dark-mode .orders-sidebar .sidebar-header { border-color: #374151; }
body.dark-mode .orders-sidebar .sidebar-title { color: #9ca3af; }
body.dark-mode .orders-sidebar .toggle-btn {
    background: #374151;
    border-color: #4b5563;
    color: #9ca3af;
}
body.dark-mode .orders-sidebar .sidebar-link { color: #e5e7eb !important; }
body.dark-mode .orders-sidebar .sidebar-link:hover {
    background: #374151;
    color: #93c5fd !important;
}
body.dark-mode .orders-sidebar .sidebar-link.active {
    background: #2563eb;
    color: #ffffff !important;
}
</style>

<script>
(function() {
    var sidebar = document.getElementById("ordersSidebar");
    var toggle = document.getElementById("ordersSidebarToggle");
    if (toggle && sidebar) {
        toggle.onclick = function () {
            sidebar.classList.toggle("collapsed");
            try { localStorage.setItem("warewolf_orders_sidebar_collapsed", sidebar.classList.contains("collapsed")); } catch (e) {}
        };
    }
})();
</script>

{% endblock %}
